name: Job 1 - Generate Topics

on:
  schedule:
    # 毎日朝6時 (JST) = 21:00 (UTC)
    - cron: '0 21 * * *'
  workflow_dispatch:

jobs:
  generate-topics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Job 1 (generate-topics)
        env:
          NEXT_PUBLIC_SITE_ID: 'kaigo'
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FIREBASE_SERVICE_ACCOUNT_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}
        run: node scripts/generate-topics.js
